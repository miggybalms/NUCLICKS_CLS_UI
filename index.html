<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUCLICKS | Sign In</title>

    <link rel="stylesheet" href="css/SignIn.css">
</head>
<body>
    <div class="login-container">
        <img class="logo-login-container" src="assets/NULIPA_Logo_White.png" alt="NULP Logo">
        <div class="welcome-message-container">
            <p class="welcome-message">Welcome to LMS, </p><p class="welcome-message"><span class="bark">BARK</span>ada!</p>
        </div>

        <div class="login-fields">
            <label>Email</label>
            <input class="login-textfield" type="email" placeholder="Enter Your Admin Email Address">

            <label>Password</label>
            <input class="login-textfield" type="password" placeholder="Enter Your Password">
            <label class="forgot-password">Forgot Password?</label>

            <a href="redirect.html" class="login-btn">Sign In</a>

            <p class="have-account">Don't Have an Account? <a href="SignUp.html" class="have-account-signin">Register Now!</a></p>

        </div>

            
    </div>
</body>
</html>
