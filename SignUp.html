<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUCLICKS | Sign Up</title>

    <link rel="stylesheet" href="css/SignUp.css">
</head>
<body>
    <div class="signup-container">
        <img class="logo-signup-container" src="assets/logos/NULIPA_Logo_Blue.png" alt="NULP Logo">
        <div class="welcome-message-container">
            <div class="join-text">
                Join Us, <span class="highlight-text">BARKada!</span>
            </div>
            <p class="subtitle">Create your learner account to access modules,<br>track your progress, and stay connected with your instructors.</p>
        </div>

        <div class="signup-fields">
            <div class="field-row">
                <div class="field-with-label">
                    <label>First Name</label>
                    <input class="signup-textfield" type="text" placeholder="Enter Your First Name">
                </div>
                <div class="field-with-label">
                    <label>Last Name</label>
                    <input class="signup-textfield" type="text" placeholder="Enter Your Last Name">
                </div>
            </div>

            <label>Personal Email Address</label>
            <input class="signup-textfield" type="email" placeholder="Enter Your Email">

            <div class="field-row">
                <div class="field-with-label">
                    <label>Password</label>
                    <input class="signup-textfield" type="password" placeholder="Enter Your Password">
                </div>
                <div class="field-with-label">
                    <label>Confirm Password</label>
                    <input class="signup-textfield" type="password" placeholder="Confirm Your Password">
                </div>
            </div>

            <label>Address (Optional)</label>
            <input class="signup-textfield" type="text" placeholder="Enter Your Home Address">

            <div>

            </div>

            <a href="redirect.html" class="signup-btn">Sign In</a>

            <p class="have-account">Alreadt Have an Account? <a href="index.html" class="have-account-signin">Sign In</a></p>

        </div>

            
    </div>
</body>
</html>
