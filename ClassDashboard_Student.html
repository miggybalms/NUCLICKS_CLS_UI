<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | NUCLICKS</title>

    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/StudentDashboard.css">
    <link rel="stylesheet" href="css/ClassDashboard_Student.css">
    <link rel="icon" href="assets/logos/NU_ICON_Blue.png">
</head>
<body>
    <div class="layout-wrapper">
        <div class="sidebar-menu">
            <img class="sidebar-menu-icon" src="assets/logos/NU_ICON_White.png" alt="NULP Logo">
            <a href="StudentDashboard.html" class="sidebar-menu-content">
                <img src="assets/icons/home-white.svg" alt="Calendar" class="menu-icon"/>
                Home
            </a>
            <a href="" class="sidebar-menu-content current">
                <img src="assets/icons/class-blue.svg" alt="Calendar" class="menu-icon"/>
                Classes
            </a>
        </div>
        <div class="dashboard-panel">
            <div class="dashboard-left">
               
                <div class="title-head">    
                    <p class="course-title">Introduction to Computer System</p>
                    <p class="instructor">Class Instructor: <span class="instructor instructor-name">Louie E. Gutierrez</span></p>
                </div>

                


            </div>
            <div class="dashboard-right">
                <div class="notif-info-container">
                    <div class="notif-bell-wrapper">
                        <img src="assets/icons/bell.svg" alt="Notifications" class="notif-bell-icon">

                        <span class="notif-badge">17</span>
                    </div>

                    <div class="user-info">
                        <div class="user-name-email">
                            <p class="user-name">Stalin, Joseph</p>
                            <p class="user-email">josephstalin@gmail.com</p>
                        </div>
                        <div class="user-photo-wrapper">
                        <img src="assets/sample_user.jpg" alt="Sample User" class="user-photo">

                            <button class="user-status-toggle">✓</button>

                            <!-- DROPDOWN -->
                            <div class="profile-dropdown">
                                <a href="index.html" class="dropdown-item logout-btn">Logout</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="calendar-container">
                    <div class="calendar-header">
                        <div class="calendar-title">
                        <img src="assets/icons/calendar.svg" alt="Calendar" />
                        <span>Calendar</span>
                        </div>

                        <div class="calendar-month">
                        <button class="cal-nav">&lt;</button>
                        <span>Mar</span>
                        <button class="cal-nav">&gt;</button>
                        </div>
                    </div>

                    <div class="calendar-grid">
                        <!-- Days header -->
                        <span class="day-label">S</span>
                        <span class="day-label">M</span>
                        <span class="day-label">T</span>
                        <span class="day-label">W</span>
                        <span class="day-label">T</span>
                        <span class="day-label">F</span>
                        <span class="day-label">S</span>

                        <!-- Empty leading days -->
                        <span class="day empty"></span>
                        <span class="day empty"></span>

                        <!-- Dates -->
                        <span class="day">1</span>
                        <span class="day">2</span>
                        <span class="day">3</span>
                        <span class="day">4</span>
                        <span class="day">5</span>
                        <span class="day">6</span>
                        <span class="day">7</span>
                        <span class="day">8</span>
                        <span class="day today">9</span>
                        <span class="day">10</span>
                        <span class="day">11</span>
                        <span class="day">12</span>
                        <span class="day">13</span>
                        <span class="day">14</span>
                        <span class="day">15</span>
                        <span class="day">16</span>
                        <span class="day">17</span>
                        <span class="day">18</span>
                        <span class="day">19</span>
                        <span class="day">20</span>
                        <span class="day">21</span>
                        <span class="day">22</span>
                        <span class="day">23</span>
                        <span class="day">24</span>
                        <span class="day">25</span>
                        <span class="day">26</span>
                        <span class="day">27</span>
                        <span class="day">28</span>
                        <span class="day">29</span>
                        <span class="day">30</span>
                        <span class="day">31</span>
                    </div>
                    </div>
                <div>

                </div>
            </div>
        </div>
    </div>

    <script>
    const userProfile = document.querySelector('.user-photo-wrapper');
    const dropdown = document.querySelector('.profile-dropdown');

    userProfile.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('active');
    });

    document.addEventListener('click', () => {
    dropdown.classList.remove('active');
    });

    </script>


</body>
</html>
