<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | NUCLICKS</title>

    <link rel="stylesheet" href="css/gen.css">
    <link rel="stylesheet" href="css/StudentDashboard.css">
</head>
<body>
    <div class="layout-wrapper">
        <div class="sidebar-menu">
            <img class="sidebar-menu-icon" src="assets/logos/NU_ICON_White.png" alt="NULP Logo">
            <a href="" class="sidebar-menu-content current">Home</a>
            <a href="" class="sidebar-menu-content current">Classes</a>
        </div>
        <div class="dashboard-panel">
            <div class="dashboard-left">
                <div class="dashboard-left-heading">
                    <div class="logo-student-db">
                        <img class="logo-head" src="assets/logos/NULIPA_Logo_Blue.png" alt="NULP Logo">

                        <div class="title-head">
                        <p class="title-text">Student</p>
                        <p class="title-text">Dashboard</p>
                        </div>
                    </div>

                    
                    <div class="enrolled-archived">
                    <div class="tab active">
                        <span>Enrolled</span>
                        <span class="count enrolled-count">20</span>
                    </div>

                    <div class="tab">
                        <span>Archived</span>
                        <span class="count archived-count">37</span>
                    </div>
                    </div>

                </div>
                <div>

                </div>
            </div>
            <div class="dashboard-right">
                <div>
                    <h1>Hello User!</h1>
                </div>
                <div>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
