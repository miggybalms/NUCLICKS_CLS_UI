<body>
    <div class="layout-wrapper">
        <div class="sidebar-menu">

        <div class="dashboard-panel">
            <!-- <div class="dashboard-left"> -->
                <div class="dashboard-left-heading">
                    <div class="logo-student-db">
                        <img class="logo-head" src="assets/logos/NULIPA_Logo_Blue.png" alt="NULP Logo">
                        <div class="title-head">
                        <p class="title-text">Super Admin</p>
                        <p class="title-text">Dashboard</p>

                    </div>
                    
                    <div class="notif-info-container">

                        <span class="notif-badge">17</span>
                    </div>

                    <div class="user-info">
                        <div class="user-name-email">
                            <p class="user-name">Stalin, Joseph</p>
                            <p class="user-email">josephstalin@gmail.com</p>

                        <div class="user-photo-wrapper">

                            <button class="user-status-toggle">✓</button>

                    </div>
                </div>

                </div>

                        <!-- Header -->

                            <button class="create-eval-btn">
                                + Create Evaluation
                            </button>
                        </div>

                        <!-- Evaluation Card -->
                        <div class="evaluation-card">
                            <div class="evaluation-card-header">
                                <h3 class="evaluation-name">Course Satisfaction Survey</h3>

                                <div class="evaluation-actions">
                                    <button class="icon-btn edit" title="Edit">
                                        <img src="assets/icons/edit-blue.svg" class="actions-icon" alt="Edit">
                                    </button>
                                    <button class="icon-btn delete" title="Delete">
                                        <img src="assets/icons/archive-blue.svg" class="actions-icon" alt="Delete">
                                    </button>
                                </div>
                            </div>

                            <p class="evaluation-course">Course: Advanced Mathematics</p>
<!-- 
                            <div class="evaluation-questions">
                                <p>1. How satisfied are you with the course content?</p>
                                <p>2. Was the instructor knowledgeable?</p>
                                <p>3. Would you recommend this course?</p>
                            </div> -->
                        </div>

                        <!-- Evaluation Card -->
                        <div class="evaluation-card">
                            <div class="evaluation-card-header">
                                <h3 class="evaluation-name">Teaching Effectiveness Evaluation</h3>

                                <div class="evaluation-actions">
                                    <button class="icon-btn edit" title="Edit">
                                        <img src="assets/icons/edit-blue.svg" class="actions-icon" alt="Edit">
                                    </button>
                                    <button class="icon-btn delete" title="Delete">
                                        <img src="assets/icons/archive-blue.svg" class="actions-icon" alt="Delete">
                                    </button>
                                </div>
                            </div>

                            <p class="evaluation-course">Course: Introduction to Physics</p>
<!-- 
                            <div class="evaluation-questions">
                                <p>1. Rate the clarity of instruction</p>

                                <p>3. Rate overall teaching effectiveness</p>
                            </div> -->
                        </div>

                    </div>


                </div>
            </div>
        </div>
    </div>

    <script>
    const userProfile = document.querySelector('.user-photo-wrapper');
    const dropdown = document.querySelector('.profile-dropdown');

    userProfile.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('active');
    });

    document.addEventListener('click', () => {
    dropdown.classList.remove('active');
    });

    </script>


</body>
